# Web Explorer - Daily Crawl Workflow
#
# Runs daily at 06:00 UTC (03:00 GMT-3 / Buenos Aires)
# This ensures the crawl captures the previous day's content
# and generates the report before the new day starts.
#
# Schedule: Every day at 06:00 UTC = 03:00 Argentina time
# This gives the system the full "web day" to process.

name: Daily Web Crawl

on:
  schedule:
    # Run at 06:00 UTC daily (03:00 AM Buenos Aires / GMT-3)
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Allow manual triggering
    inputs:
      max_pages:
        description: 'Maximum pages to crawl'
        required: false
        default: '100'
      max_depth:
        description: 'Maximum crawl depth'
        required: false
        default: '2'

permissions:
  contents: write

jobs:
  daily-crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run daily crawl
        env:
          CRAWLER_MAX_PAGES: ${{ github.event.inputs.max_pages || '100' }}
          CRAWLER_MAX_DEPTH: ${{ github.event.inputs.max_depth || '2' }}
          CRAWLER_GMT_OFFSET: '-3'
          NODE_ENV: production
        run: npx tsx src/main.ts

      - name: Check for data changes
        id: check_changes
        run: |
          if [ -n "$(git status --porcelain data/)" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push data
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "web-explorer-bot@users.noreply.github.com"
          git config --local user.name "Web Explorer Bot"
          DATE=$(date -u +%Y-%m-%d)
          git add data/
          git commit -m "📊 Daily crawl report: ${DATE}

          Automated daily web exploration and summarization.
          Generated by Web Explorer GitHub Action."
          git push

      - name: Summary
        if: always()
        run: |
          echo "## 🌐 Web Explorer Daily Crawl" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "data/index.json" ]; then
            echo "### Results" >> $GITHUB_STEP_SUMMARY
            echo "- Data directory updated" >> $GITHUB_STEP_SUMMARY
            echo "- Check the [web interface](https://navigation-in-the-web.vercel.app) for details" >> $GITHUB_STEP_SUMMARY
          else
            echo "No data generated in this run." >> $GITHUB_STEP_SUMMARY
          fi
